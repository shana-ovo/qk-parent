spring:
  #数据库连接信息
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1234
    url: jdbc:mysql://localhost:3306/qk

#mybatis配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true  #开启蛇形命名和驼峰命名自动转换
  mapper-locations: classpath:mapper/*.xml  #指定mapper.xml文件的位置
